#API KEY for accessing the cryptocoins values, USE THE DEFAULT KEY FOR TESTING ONLY
api-key: 99X0JFXBLX2YRZA7
#The interval to update the Exchange Rates (in minutes)
#(Please note that the API has a limit of 25 requests per day,
#so if you set an interval that trespasses this limit, the plugin will automatically choose one)
update-interval: 60
#The interval to save the investors data (in minutes)
saving-interval: 5
#The interval to update the richers list (in minutes)
richers-update-interval: 15
#MySQL Configuration
mysql:
#Do you want to use MySQL? If not, SQLite will be used
   enabled: false
   hostname: localhost
   port: 3306
   database: cryptomarket
   user: root
   password: '1234'
#Set here the currency to compare against the cryptocoin value
physical-currency: EUR
#Fees charged by the market on user operations
fees:
   #Fees charged on withdrawal (when the user sells cryptocoin and receives server money)
   #Both are subtracted from the amount the user would receive.
   #Order: the flat fee is subtracted first, then the percentage is applied to the remainder.
   withdrawal:
      #Flat fee deducted from the sell value, in the server currency
      flat: 0.0
      #Percentage fee (0 = no fee, 100 = take everything). Example: 2.5 means 2.5%
      percentage: 0.0
#Coins that the plugin will work with (you can find a list of valid coin in the digital_currency_list.csv file inside the JAR)
coins:
- BTC
- LTC
- ETH
- XMR
#The main menu of the plugin, accessed using /cryptomarket
menu:
   #Name of the menu
   name: '&e&lMinecore Crypto Burza'
   #Items configuration
   items:
      #The item that shows the current Exchange Rates
      coins:
         name: '&a&lPENÍZE'
         #The lore of Coins item
         # {0} holds space for the coin line(s)
         lore:
         - ' '
         - '&f{0}'
         - ' '
         - '&7Levé tlačítko - &cProdat'
         - '&7Pravé tlačítko - &aKoupit'
         #For each coin you added to the coin list, a coin-line will be added to the lore
         # {0} is the name of the coin
         # {1} is the value
         coin-line: '&f{0} &7{1}'
         #Message showed instead of the value when there has been an error
         error-no-data: Chyba, aktualizuj!
      #The item that shows the current balance of the investor
      wallet:
         name: '&3&lPENĚŽENKA'
         #The lore of the Wallet
         # {0} is the investor's server balance (Vault)
         # {1} is a placeholder for the coin line(s) (it works like the Coins item)
         lore:
         - ' '
         - '&f{0}'
         - ' '
         - '&f{1}'
         #Please refer to the Coins item, they work the same way
         coin-line: '&f{0} &7{1}'
      #The item that shows the profit if the investor sells all balance of one coin
      profit:
         name: '&fZisk při prodeji nyní'
         #The lore of the Profit item
         # {0} is a placeholder for the coin line(s) (it works like the Coins item)
         lore:
         - ' '
         - '{0}'
         - ' '
         #For each coin you added to the coin list, a coin-line will be added to the lore
         # {0} is the name of the coin
         # {1} is the color
         # {2} is the percentage (it can be negative, meaning a loss)
         coin-line: '&f{0} {1}{2}%'
         # These are the colors that the "{1}" placeholder above will use according to the value
         color:
            positive: '&a'
            neuter: '&f'
            negative: '&c'
      calendar: '&aKalendář'
      update: '&aAktualizovat'
      ranking: '&aŽebříček'
#The Calendar menu, accessed via main menu
#It shows the rates of previous days
calendar:
   name: '&f&lKALENDÁŘ'
   items:
      back: '&aZPĚT'
      next-month: '&aDalší měsíc'
      previous-month: '&aPředchozí měsíc'
      #Configures a single day in the Calendar
      day:
         #Name of the Day item
         # {0} is the day number
         name: '&fDen {0}'
         #This works like Coins' lore, please refer to it
         lore:
         - ' '
         - '{0}'
         - ' '
         #Also works like Coins' coin line
         coin-line: '{0} {1}'
         #This is showed in days after today, where there is no rate yet
         no-rates: '&c&oŽádná data'
         #Message showed instead of the value when there has been an error
         error-no-data: Chyba, aktualizuj!
#The Ranking menu, also accessed via main menu
ranking:
   name: '&6&lINVESTOŘI'
   items:
      back: '&aZPĚT'
      #Configures a richer item
      richer:
         #The name of the item
         # {0} is the position in the rank
         # {1} is the Investor's name
         name: '#{0} {1}'
         #The lore of the item
         # {0} is the total invested converted to server coin
         # {1} is the percentage compared to the server's total investments
         lore:
         - ' '
         - '{0} ({1}%)'
         - ' '
         #If there is not investor in the rank
         # {0} is the position in the rank
         no-investor: '#{0} Žádný investor'
      total-investments:
         # Name of the item
         name: '&fCelkové investice'
         # {0} is the total invested in the server
         lore:
         - ' '
         - '{0}'
         - ' '
      last-updated:
         # Name of the item
         name: '&fNaposledy aktualizováno'
         # {0} is the date and time
         lore:
         - ' '
         - '{0}'
         - ' '
#Configuration relative to the Negotiation GUI, opened via the Coins button in the main menu
negotiation:
   #Action frame (Buy / Sell picker)
   action-frame:
      name: '&e&lVyber akci'
      buy-button: '&a&lKoupit'
      buy-button-lore:
      - '&7Zaplatit serverovou měnou'
      - '&7za kryptoměnu.'
      sell-button: '&c&lProdat'
      sell-button-lore:
      - '&7Prodat kryptoměnu'
      - '&7za serverovou měnu.'
   #Coin frame (pick which coin to trade)
   coin-frame:
      name: '&e&lVyber měnu'
      # {0} is the coin symbol
      coin-button-name: '&f&l{0}'
      # {0} is the formatted value, {1} is the physical currency code
      coin-button-lore:
      - ' '
      - '&7Aktuální kurz:'
      - '&f{0} {1}'
      - ' '
      coin-button-unavailable: '&c&oData nedostupná'
   #Amount frame (pick how much to trade)
   amount-frame:
      # {0} is the action (buy/sell), {1} is the coin
      name: '&e{0} &7→ &f{1}'
      # {0} is the current amount, {1} is the coin
      info-name: '&f&l{0} {1}'
      # {0} = gross server-currency value, {1} = physical currency
      info-lore:
      - ' '
      - '&7Hodnota: &f{0} {1}'
      - ' '
      # Same placeholders plus {2} = flat fee, {3} = percentage fee, {4} = net received
      info-lore-sell:
      - ' '
      - '&7Hrubá hodnota: &f{0} {1}'
      - '&7Poplatek: &f{2} &7+ &f{3}%'
      - '&7Obdržíš: &a{4} {1}'
      - ' '
      # {0} is the step amount (1, 10, 100, 1000)
      increment-button: '&a&l+{0}'
      decrement-button: '&c&l-{0}'
      #Sets the amount to the maximum the player can trade:
      # BUY  = floor(vault balance / coin price)
      # SELL = floor(current crypto balance of that coin)
      max-button: '&6&lMax'
      max-button-lore:
      - '&7Nastaví množství na'
      - '&7maximum, které můžeš obchodovat.'
   #Confirmation frame (final review before committing)
   confirm-frame:
      name: '&e&lPotvrzení'
      # {0} is the action, {1} is the amount, {2} is the coin
      summary-name: '&f{0} &a{1} &f{2}'
      # Same placeholders as amount-frame.info-lore
      summary-lore:
      - ' '
      - '&7Celkem: &f{0} {1}'
      - ' '
      summary-lore-sell:
      - ' '
      - '&7Hrubá hodnota: &f{0} {1}'
      - '&7Poplatek: &f{2} &7+ &f{3}%'
      - '&7Obdržíš: &a{4} {1}'
      - ' '
   #Shared labels
   back-button: '&aZpět'
   confirm-button: '&a&lPotvrdit'
   cancel-button: '&c&lZrušit'
   #Action names used in summaries and success messages
   buy-action: koupit
   sell-action: prodat
   #Chat messages sent after a GUI action finishes
   success: '&aObchod proběhl úspěšně!'
   error-insufficient-balance: '&cNemáš dostatek prostředků!'
   error-outdated-data: '&cObchod selhal: data jsou zastaralá! Aktualizuj je!'
   #Appended to the amount/confirm info for SELL when a withdrawal fee is configured
   # {0} is the flat fee, {1} is the percentage fee, {2} is the net amount
   withdrawal-fee-info: ' &7(poplatek: &f{0} &7+ &f{1}%&7, obdržíš &f{2}&7)'
#Some messages the plugin will send
messages:
   error-player-not-found: '&fHráč nebyl nalezen!'
   error-invalid-amount: '&fZadané množství není platné číslo nebo je menší či rovno nule!'
   error-invalid-coin: '&fNeplatná měna!'
   error-take-insufficient-balance: '&fHráč nemá dostatek prostředků!'
   error-database: '&fChyba při připojení k databázi, kontaktuj admina!'
   error-no-permission: '&fNemáš oprávnění!'
   saving-data: '&fUkládám data...'
   player-balance-updated: '&fZůstatek hráče {0} byl aktualizován!'
   # {0} is the approximated minutes to complete the update, considering the API limits
   updating-content: '&fAktualizuji data, počkej {0} minut!'
   already-uptodate: '&fData jsou již aktuální nebo se právě aktualizují!'
   balance: '&fTvůj zůstatek je:'
   #This will be sent after balance
   #One message per coin set in this config
   # {0} is the coin name
   # {1} is its value
   balance-per-coin: '&a{0}: &f{1}'
   current-rates: 'Kurzy jsou:'
   #This will be sent after the message above
   #One message per coin set in this config
   # {0} is the coin name
   # {1} is its value
   current-rates-per-coin: '&a{0}: &f{1}'
   outdated-data: Zastaralá data, aktualizuj!
   #If something is wrong when trying to open the Ranking menu
   error-ranking-data: '&fChyba při načítání žebříčku!'
   new-balance: '&fTvůj nový zůstatek &7{0} &fje: &7{1}'
   config-reloaded: '&aKonfigurace byla úspěšně načtena!'
   config-reloaded-merged: '&aKonfigurace načtena. Chybějící položky byly doplněny z výchozího nastavení.'
   config-restored: '&eKonfigurace byla poškozená a byla obnovena z výchozího nastavení. Záloha byla uložena.'
   config-reload-failed: '&cNepodařilo se načíst konfiguraci. Podrobnosti najdeš v konzoli.'
   help-command:
   - '&bCryptoMarket - Nápověda'
   - '&b/cm balance - zobrazí tvůj zůstatek'
   - '&b/cm today - zobrazí dnešní kurzy'
   - '&b/cm update - aktualizuje kurzy'
   - '&c/cm save - uloží data do databáze'
   - '&c/cm give <hráč> <množství> <měna> - dá hráči měnu'
   - '&c/cm take <hráč> <množství> <měna> - odebere hráči měnu'
   - '&c/cm set <hráč> <množství> <měna> - nastaví hráči měnu'
   - '&c/cm reload - znovu načte konfiguraci'